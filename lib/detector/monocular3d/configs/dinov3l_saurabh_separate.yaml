# =============================================================================
# Monocular3D Training — Default Configuration
# =============================================================================
# This is the base config with all standard training defaults.
# Override any field via CLI: python train.py --config configs/default.yaml --lr 5e-5
# =============================================================================

# --- Experiment ---
experiment_name: "mono3d_default"
working_dir: "/home/cse/msr/csy227518/scratch/Projects/Active/Scene4Cast/lib/detector/monocular3d"
save_path: "/home/cse/msr/csy227518/scratch/Projects/Active/Scene4Cast/save_path"

# --- Data ---
data_path: "/home/cse/msr/csy227518/scratch/Datasets/action_genome"
world_3d_annotations_path: null   # null = use data_path/world_annotations/bbox_annotations_3d_final

# --- Model ---
model: "v3l"                       # "v2" = DINOv2 ViT-B (86M, fast), "v2l" = ViT-L, "v3l" = DINOv3 ViT-L
num_classes: null                  # null = auto-detect from dataset
pretrained: true
use_compile: false                 # torch.compile() — PyTorch 2.0+

# --- Training ---
lr: 1.0e-4
weight_decay: 0.001
batch_size: 64
epochs: 70
gradient_accumulation_steps: 1
max_grad_norm: 1.0
warmup_fraction: 0.01              # fraction of total steps for warmup

# --- Thresholds ---
head_3d_mode: "separate"            # "unified" (shared FC) or "separate" (hooked features)
max_3d_proposals: 64               # max positive proposals for 3D loss per batch
iou_match_2d_eval: 0.5             # 2D IoU threshold for matching preds to GT in 3D evaluation

# --- Loss Weights ---
weight_cls: 1.0                    # Classification loss weight
weight_box: 1.0                    # Box regression loss weight
weight_obj: 1.0                    # RPN objectness loss weight
weight_rpn: 1.0                    # RPN box regression loss weight
weight_3d: 1.0                     # 3D head loss weight

# --- Image ---
target_size: null                  # null = use Pi3-compatible pixel_limit resize (aspect-ratio preserving)
pixel_limit: 255000                # Pi3's PIXEL_LIMIT: dims rounded to multiples of patch_size
patch_size: 14                     # Must match backbone patch_size (14 for DINOv2)

# --- DataLoader ---
num_workers_train: 8
num_workers_test: 8
prefetch_factor: 4
persistent_workers: true

# --- Logging ---
use_wandb: true
wandb_project: "DINOv3-large-separate-Object-Detector-AG-3D"
iter_log_every: 10
eval_every_iters: 10000000

# --- Visualization ---
plot_each_epoch: true
plot_sample_idx: 120
plot_score_thresh: 0.1

# --- Misc ---
use_collate: true
use_accelerator: true
ckpt: null                         # path to checkpoint folder for resume