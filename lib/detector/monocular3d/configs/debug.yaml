# =============================================================================
# Monocular3D Training — Debug Configuration
# =============================================================================
# Fast iteration for testing pipeline. Tiny data, few epochs, no W&B.
# Usage: python train.py --config configs/debug.yaml
# =============================================================================

experiment_name: "mono3d_debug"

# --- Model (smaller for speed) ---
model: "v2"                        # ViT-B (faster)
pretrained: false                  # skip HF download
use_compile: false

# --- Training ---
lr: 1.0e-4
batch_size: 4
epochs: 2
gradient_accumulation_steps: 1

# --- Image ---
target_size: 224

# --- DataLoader ---
num_workers_train: 0
num_workers_test: 0
persistent_workers: false

# --- Logging ---
use_wandb: false
iter_log_every: 10

# --- Visualization ---
plot_each_epoch: false

# --- Misc ---
use_accelerator: false
