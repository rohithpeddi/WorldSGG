# =============================================================================
# V1: DINOv3-Large (ViT-L/16) — Loss-fixed 3D training
# =============================================================================
# Derived from dinov3l_saurabh.yaml with V1 loss fixes:
#   - weight_3d=0.1, ramp disabled, loss clamp removed, diagonal min=0.25
# =============================================================================

# --- Experiment ---
experiment_name: "v1_dinov3l"
working_dir: "/home/cse/msr/csy227518/scratch/Projects/Active/Scene4Cast/lib/detector/monocular3d"
save_path: "/home/cse/msr/csy227518/scratch/Projects/Active/Scene4Cast/save_path"

# --- Data ---
data_path: "/home/cse/msr/csy227518/scratch/Datasets/action_genome"
world_3d_annotations_path: null

# --- Model ---
model: "v3l"                       # DINOv3 ViT-L/16
num_classes: null
pretrained: true
use_compile: false

# --- Training ---
lr: 1.0e-4
weight_decay: 0.001
batch_size: 64
epochs: 70
gradient_accumulation_steps: 1
max_grad_norm: 1.0
warmup_fraction: 0.01

# --- Thresholds ---
head_3d_mode: "unified"
max_3d_proposals: 64
iou_match_2d_eval: 0.5

# --- Loss Weights (V1 fixes) ---
weight_cls: 1.0
weight_box: 1.0
weight_obj: 1.0
weight_rpn: 1.0
weight_3d: 0.1
weight_3d_ramp_epochs: 0

# --- 3D Head ---
head_3d_version: "v1"
depth_maps_dir: null

# --- Image ---
target_size: null
pixel_limit: 255000
patch_size: 14

# --- DataLoader ---
num_workers_train: 8
num_workers_test: 8
prefetch_factor: 4
persistent_workers: true

# --- Logging ---
use_wandb: true
wandb_project: "DINOv3-large-Object-Detector-AG-3D"
iter_log_every: 10
eval_every_iters: 10000000

# --- Visualization ---
plot_each_epoch: true
plot_sample_idx: 120
plot_score_thresh: 0.1

# --- Misc ---
use_collate: true
use_accelerator: true
ckpt: null