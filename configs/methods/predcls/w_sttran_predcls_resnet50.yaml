# ============================================================================
# W-STTran — PredCls Setting (ResNet50 Mono3D)
# ============================================================================
# Usage:
#   python train_wsgg_methods.py --config configs/methods/predcls/w_sttran_predcls_resnet50.yaml
#   python test_wsgg_methods.py --config configs/methods/predcls/w_sttran_predcls_resnet50.yaml --ckpt path/to/ckpt.tar
# ============================================================================

# ---- Method & Setting ----
method_name: w_sttran
mode: predcls
feature_model: resnet50
task_name: worldsgg
experiment_name: w_sttran_predcls_resnet50_v1

# ---- Paths ----
data_path: /data/rohith/ag
save_path: /data/rohith/ag/checkpoints
results_path: results
ckpt: null
world_sg_dir: ""

# ---- Shared Architecture ----
d_model: 256
d_struct: 256
d_visual: 256
d_detector_roi: 1024
d_camera: 128
n_heads: 4
d_feedforward: 512
max_objects: 64
dropout: 0.1

# ---- Relationship Predictor ----
d_rel: 256
d_text: 128
d_union_roi: 1024
n_rel_layers: 2
n_rel_heads: 4
n_temporal_edge_layers: 1
clip_embeddings_path: features/clip_features/clip_text_embeddings.npy

# ---- Training ----
nepoch: 20
lr: 1e-4
weight_decay: 1e-4
warmup_fraction: 0.1
grad_clip: 5.0
optimizer: adamw
bce_loss: true
use_wandb: true
use_amp: true
log_every: 100
include_invisible: true
datasize: large
skip_test: false

# ---- W-STTran Specific ----
n_gnn_layers: 3

# ---- Loss ----
lambda_vlm: 0.2
label_smoothing_vlm: 0.2
