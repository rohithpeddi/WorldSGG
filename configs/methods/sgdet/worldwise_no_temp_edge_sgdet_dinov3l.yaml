# ============================================================================
# WorldWise Ablation: worldwise_no_temp_edge - SGDET (dinov3l)
# ============================================================================
# Usage:
#   python train_wsgg_methods.py --config configs/methods/sgdet/worldwise_no_temp_edge_sgdet_dinov3l.yaml
# ============================================================================

data_path: /data/rohith/ag
save_path: /data/rohith/ag/checkpoints
results_path: results
ckpt: null
world_sg_dir: ''
d_model: 256
d_struct: 256
d_visual: 256
d_detector_roi: 1024
d_camera: 128
d_motion: 64
n_heads: 4
d_feedforward: 512
max_objects: 64
dropout: 0.1
d_rel: 256
d_text: 128
d_union_roi: 1024
n_rel_layers: 2
n_rel_heads: 4
n_temporal_edge_layers: 1
clip_embeddings_path: features/clip_features/clip_text_embeddings.npy
nepoch: 20
lr: 0.0001
weight_decay: 0.0001
warmup_fraction: 0.1
grad_clip: 5.0
optimizer: adamw
bce_loss: true
use_wandb: true
use_amp: true
log_every: 100
include_invisible: true
datasize: large
skip_test: false
n_gnn_layers: 3
lambda_vlm: 0.2
label_smoothing_vlm: 0.2
n_cross_attn_layers: 2
n_self_attn_layers: 3
d_memory: 256
lambda_reconstruction: 0.5
lambda_recon_dominance: 0.1
p_simulate_unseen: 0.3
p_mask_visible: 0.3
use_object_spatial_encoder: true
use_camera_temporal: true
use_object_motion_encoder: true
use_temporal_edge_attn: false
method_name: worldwise
mode: sgdet
feature_model: dinov3l
task_name: worldsgg
experiment_name: worldwise_no_temp_edge_sgdet_dinov3l_v1
