# ============================================================================
# AMWAE — SGDet Setting
# ============================================================================
# Usage:
#   python train_wsgg_methods.py --config configs/methods/sgdet/amwae_sgdet_dinov2l.yaml
#   python test_wsgg_methods.py --config configs/methods/sgdet/amwae_sgdet_dinov2l.yaml --ckpt path/to/ckpt.tar
# ============================================================================

# ---- Method & Setting ----
method_name: amwae
mode: sgdet
feature_model: dinov2l
task_name: worldsgg
experiment_name: amwae_sgdet_dinov2l

# ---- Paths ----
data_path: /data/rohith/ag
save_path: /data/rohith/ag/checkpoints
results_path: results
ckpt: null  # Set to "checkpoint_5" to resume from epoch 5
world_sg_dir: ""

# ---- Shared Architecture ----
d_model: 256
d_struct: 256
d_visual: 256
d_detector_roi: 1024
d_camera: 128
d_motion: 64
n_heads: 4
d_feedforward: 512
max_objects: 64
dropout: 0.1

# ---- Relationship Predictor ----
d_rel: 256
d_text: 128
d_union_roi: 1024
n_rel_layers: 2
n_rel_heads: 4
n_temporal_edge_layers: 1
clip_embeddings_path: features/clip_features/clip_text_embeddings.npy

# ---- Training ----
nepoch: 20
lr: 1e-4
weight_decay: 1e-4
warmup_fraction: 0.1
grad_clip: 5.0
optimizer: adamw
bce_loss: true
use_wandb: true
use_amp: true
log_every: 100
include_invisible: true
datasize: large
skip_test: true  # Set to false when test dataset is ready

# ---- AMWAE Specific ----
n_cross_attn_layers: 2
n_self_attn_layers: 4
p_mask_visible: 0.5

# ---- Loss ----
lambda_vlm: 0.2
label_smoothing_vlm: 0.2
p_simulate_unseen: 0.25
lambda_reconstruction: 1.0
lambda_recon_dominance: 5.0
lambda_contrastive: 0.5
