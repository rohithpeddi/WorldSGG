# =============================================================================
# ROI Feature Extraction Config — PredCls (DINOv2-Base)
# =============================================================================
# Uses GT bboxes + GDino fill. No detection. All bboxes in Pi-3 space.
# Output: {data_path}/features/roi_features/predcls/dinov2b/{train,test}/
#
# Usage:
#   python datasets/preprocess/features/extract_roi_features_predcls.py \
#       --config configs/features/predcls/ex_roi_feat_v1_dinov2b_saurabh.yaml
#
#   Override via CLI:
#       --ckpt checkpoint_50 --video 001YG.mp4 --split train
# =============================================================================

# --- Detector (must match training config) ---
model: "v2"
experiment_name: "dinov2_separate"
working_dir: "/home/cse/msr/csy227518/scratch/Projects/Active/Scene4Cast/lib/detector/monocular3d"
ckpt: checkpoint_43

# --- Detector architecture (must match training) ---
head_3d_mode: "separate"
num_classes: 37
pretrained: true

# --- Data ---
data_path: "/home/cse/msr/csy227518/scratch/Datasets/action_genome"

# --- Image processing (must match ag_dataset_3d.py / training config) ---
pixel_limit: 255000
patch_size: 14

# --- Feature Extraction ---
output_dir: null
gdino_score_threshold: 0.3
store_dtype: "float16"
overwrite: false
gpu: 0
video: null
split: null
