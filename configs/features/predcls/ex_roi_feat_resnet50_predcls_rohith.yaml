# =============================================================================
# ROI Feature Extraction Config — PredCls (ResNet50-FPN)
# =============================================================================
# Uses GT bboxes + GDino fill. No detection. All bboxes in Pi-3 space.
# Output: {data_path}/features/roi_features/predcls/resnet50/{train,test}/
#
# Usage:
#   python datasets/preprocess/features/extract_roi_features_predcls.py \
#       --config configs/features/predcls/ex_roi_feat_resnet50_predcls_rohith.yaml
#
#   Override via CLI:
#       --video 001YG.mp4 --split train
# =============================================================================

# --- Detector (must match training config) ---
backbone: "resnet50"
model: "resnet50"
experiment_name: "fasterrcnn_separate"
working_dir: "/home/rxp190007/CODE/Scene4Cast/lib/detector/monocular3d"
ckpt: "."

# --- Detector architecture (must match training) ---
head_3d_mode: "separate"
num_classes: 37
pretrained: true

# --- Data ---
data_path: "/data/rohith/ag"

# --- Image processing (must match detector training config) ---
pixel_limit: 255000
patch_size: 32                       # ResNet stride-32 divisibility

# --- Feature Extraction ---
output_dir: null                     # auto: {data_path}/features/roi_features/predcls/resnet50/{split}
gdino_score_threshold: 0.3
store_dtype: "float16"
overwrite: false
gpu: 0
video: null
split: null
