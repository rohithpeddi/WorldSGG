# =============================================================================
# ROI Feature Extraction Config — SGDet (DINOv3-Large)
# =============================================================================
# Runs DinoV3 detector → filter → GT matching → augmentation → 3D prediction.
# All bboxes in Pi-3 space. Train gets GT augmentation, test does not.
# Output: {data_path}/features/roi_features/sgdet/dinov3l/{train,test}/
#
# Usage:
#   python datasets/preprocess/features/extract_roi_features_sgdet.py \
#       --config configs/features/sgdet/ex_roi_feat_v1_dinov3_large_rohith.yaml
# =============================================================================

# --- Detector (must match training config) ---
model: "v3l"
experiment_name: "v1_dinov3l_separate"
working_dir: "/home/rxp190007/CODE/Scene4Cast/lib/detector/monocular3d"
ckpt: checkpoint_30

# --- Detector architecture (must match training) ---
head_3d_mode: "separate"
num_classes: 37
pretrained: true

# --- Data ---
data_path: "/data/rohith/ag"

# --- Image processing (must match ag_dataset_3d.py / training config) ---
pixel_limit: 255000
patch_size: 14

# --- SGDet detection parameters ---
score_threshold: 0.1
nms_threshold: 0.5
assign_iou_train: 0.5
assign_iou_test: 0.3
use_supply: true

# --- Feature Extraction ---
output_dir: null
store_dtype: "float16"
overwrite: false
gpu: 0
video: null
split: null
