# =============================================================================
# ROI Feature Extraction Config — SGDet (DINOv2-Base)
# =============================================================================
# Runs DinoV3 detector → filter → GT matching → augmentation → 3D prediction.
# All bboxes in Pi-3 space. Train gets GT augmentation, test does not.
# Output: {data_path}/features/roi_features/sgdet/dinov2b/{train,test}/
#
# Usage:
#   python datasets/preprocess/features/extract_roi_features_sgdet.py \
#       --config configs/features/sgdet/ex_roi_feat_v1_dinov2b_rohith.yaml
#
#   Override via CLI:
#       --ckpt checkpoint_50 --video 001YG.mp4 --split train
# =============================================================================

# --- Detector (must match training config) ---
model: "v2"
experiment_name: "v1_dinov2b_separate"
working_dir: "/home/rxp190007/CODE/Scene4Cast/lib/detector/monocular3d"
ckpt: checkpoint_43

# --- Detector architecture (must match training) ---
head_3d_mode: "separate"
num_classes: 37
pretrained: true

# --- Data ---
data_path: "/data/rohith/ag"

# --- Image processing (must match ag_dataset_3d.py / training config) ---
pixel_limit: 255000
patch_size: 14

# --- SGDet detection parameters ---
score_threshold: 0.1                 # minimum detection confidence
nms_threshold: 0.5                   # NMS IoU threshold (built into model)
assign_iou_train: 0.5               # IoU threshold for GT matching (train)
assign_iou_test: 0.3                # IoU threshold for GT matching (test)
use_supply: true                     # inject unfound GT boxes during training

# --- Feature Extraction ---
output_dir: null
store_dtype: "float16"
overwrite: false
gpu: 0
video: null
split: null
