# =============================================================================
# ResNet50-FPN-V2 — Separate 3D head, fully fine-tuned
# =============================================================================
# Uses torchvision's fasterrcnn_resnet50_fpn_v2 with COCO-pretrained weights.
# Full ResNet50 body + FPN is trainable. Separate 3D head hooks into shared FC.
# =============================================================================

# --- Experiment ---
experiment_name: "v1_resnet50_separate"
working_dir: "/home/cse/msr/csy227518/scratch/Projects/Active/Scene4Cast/lib/detector/monocular3d"
save_path: "/home/cse/msr/csy227518/scratch/Projects/Active/Scene4Cast/save_path"

# --- Data ---
data_path: "/home/cse/msr/csy227518/scratch/Datasets/action_genome"
world_3d_annotations_path: null   # null = use dataset default (monocular3d_bbox_annotations, camera-space)

# --- Model ---
backbone: "resnet50"               # "dino_v2" | "dino_v3" | "resnet50"
model: "resnet50"                  # Unused by ResNet path, but kept for logging
num_classes: null
pretrained: true
use_compile: false

# --- Training ---
lr: 5.0e-5                         # Lower LR for fine-tuning COCO-pretrained weights
weight_decay: 0.001
batch_size: 64
epochs: 50
gradient_accumulation_steps: 1
max_grad_norm: 1.0
warmup_fraction: 0.01

# --- Thresholds ---
head_3d_mode: "separate"           # "unified" (shared FC) or "separate" (hooked features)
max_3d_proposals: 64
iou_match_2d_eval: 0.5

# --- Loss Weights ---
weight_cls: 1.0
weight_box: 1.0
weight_obj: 1.0
weight_rpn: 1.0
weight_3d: 1.0
weight_3d_ramp_epochs: 5           # Stabilize 2D first, then ramp 3D

# --- 3D Head ---
head_3d_version: "v1"
depth_maps_dir: null

# --- Image ---
target_size: null
pixel_limit: 255000
patch_size: 32                     # Divisibility for ResNet (not ViT patch_size)

# --- DataLoader ---
num_workers_train: 8
num_workers_test: 8
prefetch_factor: 4
persistent_workers: true

# --- Logging ---
use_wandb: true
wandb_project: "ResNet50-separate-Object-Detector-AG-3D"
iter_log_every: 10
eval_every_iters: 10000000

# --- Visualization ---
plot_each_epoch: true
plot_sample_idx: 120
plot_score_thresh: 0.1

# --- Misc ---
use_collate: true
use_accelerator: true
ckpt: null
