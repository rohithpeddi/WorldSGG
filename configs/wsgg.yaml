# ============================================================================
# WSGG (World Scene Graph Generation) — Unified Configuration
# ============================================================================
# Usage:
#   python train_wsgg_methods.py --config configs/wsgg.yaml
#   python train_wsgg_methods.py --config configs/wsgg.yaml --method_name amwae --lr 5e-5
# ============================================================================

# ---- Method Selection ----
method_name: gl_stgn         # gl_stgn | amwae | lks_buffer
mode: predcls                # predcls | sgcls | sgdet
task_name: worldsgg

# ---- Paths ----
data_path: /data/rohith/ag
save_path: /data/rohith/ag/checkpoints
results_path: results
ckpt: null
world_sg_dir: ""

# ---- Detector ----
detector_type: dino_mono3d   # dino_mono3d | frcnn | none
detector_ckpt: ""
detector_model: v3l
detector_frozen: true
num_detector_classes: 37

# ---- Shared Architecture ----
d_model: 256
d_memory: 256                # GL-STGN memory dim (typically == d_model)
d_struct: 256
d_visual: 256
d_detector_roi: 1024
d_camera: 128                # Camera pose encoder output dim
d_motion: 64                 # Motion feature encoder output dim
n_heads: 4
d_feedforward: 512
max_objects: 64
dropout: 0.1

# ---- Relationship Predictor ----
d_rel: 256                   # Relationship token dimension
d_text: 128                  # CLIP text projection dimension
d_union_roi: 1024            # Union ROI feature dim (from DINO)
n_rel_layers: 2              # Relationship self-attention layers
n_rel_heads: 4               # Relationship self-attention heads
n_temporal_edge_layers: 1    # Temporal edge cross-attention layers
clip_embeddings_path: features/clip_features/clip_text_embeddings.npy  # relative to data_path

# ---- Training ----
nepoch: 20
lr: 1e-4
weight_decay: 1e-4
grad_clip: 5.0
optimizer: adamw
bce_loss: true
use_wandb: false
use_amp: true
log_every: 100
include_invisible: true
datasize: large

# ---- GL-STGN Specific ----
n_gnn_layers: 3              # Graph layers / GNN layers
n_graph_layers: 3            # Alias for GL-STGN
bptt_chunk_size: 5
chunk_length: 16
memory_init: zeros
p_mask_visual: 0.3
teacher_forcing_epochs: 5

# ---- AMWAE Specific ----
n_cross_attn_layers: 2       # Retriever layers
n_self_attn_layers: 4        # Diffusion layers
n_retriever_layers: 2
n_diffusion_layers: 4
memory_bank_size: 128
p_mask_visible: 0.5
temperature: 0.07



# ============================================================================
# VLM Noisy Label Training
# ============================================================================

# ---- Universal: Asymmetric Loss ----
lambda_vlm: 0.2              # VLM pseudo-label weight (vs 1.0 for manual)
label_smoothing_vlm: 0.2     # Label smoothing epsilon for VLM targets


# ---- M1 (GL-STGN): Memory Shielding ----
detach_unseen_memory: true   # Stop gradients from VLM loss to GRU
lambda_smooth: 0.1           # Temporal inertia regularization weight
movement_thresh: 0.3         # Meters — skip smoothing if object moved

# ---- M2 (AMWAE): Simulated Unseen ----
p_simulate_unseen: 0.25      # Fraction of visible objects to mask during training
lambda_recon_dominance: 5.0  # Feature reconstruction >> VLM edge loss
lambda_reconstruction: 1.0
lambda_contrastive: 0.5

# ---- Baselines: same universal params apply ----
lambda_unseen: 0.2           # Backward compat alias → lambda_vlm
